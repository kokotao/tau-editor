name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA). Example: v0.2.0"
        required: false
        default: ""
      release_tag:
        description: "Release tag to upload assets to. Example: v0.2.0"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app"
            bundlePath: frontend/src-tauri/target/universal-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            args: ""
            bundlePath: frontend/src-tauri/target/release/bundle
          - platform: windows-latest
            args: ""
            bundlePath: frontend/src-tauri/target/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system libraries
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles
        working-directory: frontend
        run: pnpm tauri build ${{ matrix.args }}

      - name: Package macOS DMG and ZIP artifacts
        if: matrix.platform == 'macos-latest'
        env:
          RELEASE_VERSION: ${{ inputs.release_tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          ./scripts/package-macos-app.sh "${{ matrix.bundlePath }}" "TauEditor" "${VERSION}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            ${{ matrix.bundlePath }}/**/*.dmg
            ${{ matrix.bundlePath }}/artifacts/*.dmg
            ${{ matrix.bundlePath }}/artifacts/*.zip
            ${{ matrix.bundlePath }}/**/*.app.tar.gz
            ${{ matrix.bundlePath }}/**/*.deb
            ${{ matrix.bundlePath }}/**/*.AppImage
            ${{ matrix.bundlePath }}/**/*.rpm
            ${{ matrix.bundlePath }}/**/*.msi
            ${{ matrix.bundlePath }}/**/*.exe

  publish-release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build-tauri
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          merge-multiple: true
          path: release-assets

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists"
            exit 0
          fi

          gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          count=$(find release-assets -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.app.tar.gz' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
            | wc -l | tr -d ' ')
          if [ "${count}" -eq 0 ]; then
            echo "No release files found in release-assets"
            exit 1
          fi

          echo "Uploading ${count} files to release ${RELEASE_TAG}"
          while IFS= read -r -d '' file; do
            echo "Uploading ${file}"
            gh release upload "${RELEASE_TAG}" "${file}" --clobber
          done < <(find release-assets -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.app.tar.gz' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
            -print0)
